<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>House Price Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🏠 House Price Prediction</h1>

    <form method="POST">
        <input type="number" name="income" placeholder="Area Income" required>
        <input type="number" name="age" placeholder="House Age" required>
        <input type="number" name="rooms" placeholder="Rooms" required>
        <input type="number" name="bedrooms" placeholder="Bedrooms" required>
        <input type="number" name="population" placeholder="Population" required>

        <button type="submit">Predict</button>
    </form>

    {% if price %}
    <div class="result">
        Predicted Price: {{ price }}
    </div>
    {% endif %}
</div>

</body>
</html>
