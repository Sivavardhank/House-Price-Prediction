<!DOCTYPE html>
<html>
<head>
    <title>House Price Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container fade-in">
    <h1>🏠 House Price Prediction</h1>

    <form method="POST">
        <input name="income" placeholder="Income" required>
        <input name="age" placeholder="House Age" required>
        <input name="rooms" placeholder="Rooms" required>
        <input name="bedrooms" placeholder="Bedrooms" required>
        <input name="population" placeholder="Population" required>
        <button>Predict</button>
    </form>

    {% if price %}
    <div class="result slide-up">{{ price }}</div>
    {% endif %}

    <a href="/dashboard">📊 View Dashboard</a>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
